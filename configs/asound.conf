# ALSA dmix – Paralleler DAC-Zugriff für Mopidy + AirPlay 2
#
# Erlaubt mehreren Programmen gleichzeitig auf den USB-DAC
# zuzugreifen, ohne "Device or resource busy"-Fehler.
#
# Apple USB-C Headphone Adapter: fixed 48 kHz, Hardware "Headphone"-Mixer

pcm.!default {
    type dmix
    slave {
        pcm "hw:0"
        period_time 0
        period_size 1024
        buffer_size 4096
        rate 48000
    }
    bindings {
        0 0
        1 1
    }
}

ctl.!default {
    type hw
    card 0
}