// Shairport-Sync 5.0.4 Konfiguration – AirPlay 2 auf Pi Zero 2
// Siehe: man shairport-sync.conf für alle Optionen
//
// ⚠ Bekannte Probleme:
//   - Apple USB-C DAC: SPS_FORMAT-Crash bei Silence-Puffer → disable_standby_mode = "never"
//   - nqptp benötigt CAP_NET_BIND_SERVICE in service-Datei

general = {
    name = "PiZero-AirPlay2";
    volume_range_db = 30;
    output_device = "plughw:0";       // Apple USB-C DAC, Rate-Konvertierung via plughw
    mixer_control_name = "Headphone";
    ignore_volume_control = "no";     // iPhone regelt Lautstärke
    mdns = "avahi";                   // mDNS-Announce zwingend erforderlich
    disable_standby_mode = "never";   // Workaround: SPS_FORMAT-Crash mit Apple DAC
    run_this_before_playing = "/usr/local/bin/airplay-mopidy.sh start";
    run_this_after_playing = "/usr/local/bin/airplay-mopidy.sh stop";
};

alsa = {
    output_format = "S16_LE";         // Apple DAC: S16_LE + S24_3LE, S16_LE ist am stabilsten
    output_rate = 48000;              // Apple DAC fixed 48 kHz
    period_size = 1024;
    buffer_size = 4096;
    use_mmap_if_available = "yes";
};

sessioncontrol = {
    wait_for_clock_sync = "yes";      // AirPlay 2: nqptp erforderlich
};