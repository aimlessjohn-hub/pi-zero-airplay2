name: Build AirPlay 2 (ARM64)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build in Debian container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            arm64v8/debian:bookworm \
            bash -c "
              set -e

              apt-get update -qq
              apt-get install -y -qq \
                autoconf automake build-essential git \
                libavahi-client-dev libavcodec-dev libavformat-dev libavutil-dev \
                libconfig-dev libdaemon-dev libgcrypt-dev libglib2.0-dev \
                libplist-dev libplist-utils libpopt-dev libsndfile1-dev \
                libsodium-dev libsoxr-dev libssl-dev libsystemd-dev \
                libtool pkg-config uuid-dev xxd

              # nqptp
              git clone --depth 1 https://github.com/mikebrady/nqptp.git /tmp/nqptp
              cd /tmp/nqptp
              autoreconf -fi
              ./configure --with-systemd-startup
              make -j\\\$(nproc)
              make install DESTDIR=/workspace/build/nqptp

              # ALAC
              git clone --depth 1 https://github.com/mikebrady/alac.git /tmp/alac
              cd /tmp/alac
              autoreconf -fi
              ./configure
              make -j\\\$(nproc)
              make install
              ldconfig

              # Shairport-Sync 5.0.4
              git clone --depth 1 --branch 5.0.4 https://github.com/mikebrady/shairport-sync.git /tmp/shairport-sync
              cd /tmp/shairport-sync
              autoreconf -fi
              ./configure --with-airplay-2 --with-ssl=openssl --with-avahi --with-soxr
              make -j\\\$(nproc)
              make install DESTDIR=/workspace/build/shairport-sync
            "

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar -czf dist/airplay2-arm64.tar.gz -C build .
          echo "Build complete"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airplay2-arm64
          path: dist/*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            airplay2-arm64/*.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}