name: Build AirPlay 2 (ARM64)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # Native ARM64, kein QEMU!
    permissions:
      contents: write

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Update apt cache
        run: sudo apt-get update

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libavahi-client-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libconfig-dev \
            libdaemon-dev \
            libgcrypt-dev \
            libglib2.0-dev \
            libplist-dev \
            libplist-utils \
            libpopt-dev \
            libsndfile1-dev \
            libsodium-dev \
            libsoxr-dev \
            libssl-dev \
            libtool \
            pkg-config \
            uuid-dev \
            xxd

      - name: Build nqptp
        run: |
          git clone --depth 1 https://github.com/mikebrady/nqptp.git /tmp/nqptp
          cd /tmp/nqptp
          autoreconf -fi
          ./configure --with-systemd-startup
          make -j$(nproc)
          sudo make install DESTDIR=${{ github.workspace }}/build/nqptp

      - name: Build ALAC decoder (Apple Lossless)
        run: |
          git clone --depth 1 https://github.com/mikebrady/alac.git /tmp/alac
          cd /tmp/alac
          autoreconf -fi
          ./configure
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build Shairport-Sync 5.0.4
        run: |
          git clone --depth 1 --branch 5.0.4 https://github.com/mikebrady/shairport-sync.git /tmp/shairport-sync
          cd /tmp/shairport-sync
          autoreconf -fi
          ./configure --with-airplay-2 --with-ssl=openssl --with-avahi --with-soxr
          make -j$(nproc)
          sudo make install DESTDIR=${{ github.workspace }}/build/shairport-sync

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar -czf dist/airplay2-arm64.tar.gz -C build .
          echo "Build complete"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airplay2-arm64
          path: dist/*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            airplay2-arm64/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false